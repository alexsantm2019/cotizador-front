<div class="container-fluid dashboard">

  <!-- KPIs -->
  <div class="row g-2 mb-2">
    <div class="col-lg-3 col-md-6">
      <div class="kpi-card">
        <i class="fa fa-tag text-success"></i>
        <div>
          <h5>{{ productos.length }}</h5>
          <small>Productos</small>
        </div>
      </div>
    </div>

    <div class="col-lg-3 col-md-6">
      <div class="kpi-card">
        <i class="fa fa-box-open text-primary"></i>
        <div>
          <h5>{{ paquetes.length }}</h5>
          <small>Paquetes</small>
        </div>
      </div>
    </div>

    <div class="col-lg-3 col-md-6">
      <div class="kpi-card">
        <i class="fa fa-money-bill text-warning"></i>
        <div>
          <h5>{{ cotizaciones.length }}</h5>
          <small>Cotizaciones</small>
        </div>
      </div>
    </div>

    <div class="col-lg-3 col-md-6">
      <div class="kpi-card">
        <i class="fa fa-user-tie text-danger"></i>
        <div>
          <h5>{{ clientes.length }}</h5>
          <small>Clientes</small>
        </div>
      </div>
    </div>
  </div>

  <!-- Filtros -->
  @if (cotizaciones.length > 0) {
  <form [formGroup]="filterForm" (ngSubmit)="getCotizaciones()" class="filter-bar mb-2">

    <span class="fw-semibold">Mes</span>
    <select class="form-select form-select-sm w-auto" formControlName="month">
      <option *ngFor="let month of months" [value]="month.value">
        {{ month.label }}
      </option>
    </select>

    <span class="fw-semibold">Año</span>
    <select class="form-select form-select-sm w-auto" formControlName="year">
      <option *ngFor="let year of years" [ngValue]="year">
        {{ year }}
      </option>
    </select>

    <button class="btn btn-sm btn-secondary">
      Filtrar
    </button>

    <span class="ms-auto text-muted small">
      {{ cotizaciones.length }} registros
    </span>
  </form>

  <!-- Gráfico -->
  <div class="card shadow-sm">
    <div class="card-header py-2">
      <strong>Cotizaciones este mes</strong>
    </div>
    <div class="card-body p-2 d-flex justify-content-center">
      <apx-chart [labels]="pie1CAC.labels!" [chart]="pie1CAC.chart!" [series]="pie1CAC.series!"
        [colors]="pie1CAC.colors!" [legend]="pie1CAC.legend!" [responsive]="pie1CAC.responsive!">
      </apx-chart>
    </div>
  </div>

  } @else {
  <div class="alert alert-warning mt-3">
    <i class="feather icon-alert-triangle"></i>
    No existen cotizaciones
  </div>
  }

</div>
