<div class="row">
  <div class="col-lg-12 mb-1 mt-2">
    <app-cotizacion-form [isEditMode]="false" [cotizacionExistente]="null"
      (cotizacionGuardada)="actualizarListaCotizaciones()" />

      <button type="button" class="btn btn-sm btn-light-primary mx-1" (click)="actualizarListaCotizaciones()">
        Refresh 
      </button>
  </div>
  <div class="col-lg-12">
    <app-lista-cotizaciones #listaCotizaciones (editarCotizacionEvent)="editarCotizacion($event)" />
  </div>
</div>
